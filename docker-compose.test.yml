services:
  postgres:
    image: pgvector/pgvector@sha256:1d533553fefe4f12e5d80c7b80622ba0c382abb5758856f52983d8789179f0fb
    environment:
      POSTGRES_DB: git_cdc
      POSTGRES_USER: git_cdc
      POSTGRES_PASSWORD: git_cdc
    ports:
      - "127.0.0.1:55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U git_cdc -d git_cdc"]
      interval: 2s
      timeout: 2s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data

  minio:
    image: quay.io/minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: git_cdc
      MINIO_ROOT_PASSWORD: git_cdc_secret
    ports:
      - "127.0.0.1:59000:9000"
      - "127.0.0.1:59001:9001"
    tmpfs:
      - /data

  minio-init:
    image: quay.io/minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    depends_on:
      - minio
    entrypoint: /bin/sh
    command:
      - -c
      - >-
        until mc alias set local http://minio:9000 git_cdc git_cdc_secret; do sleep 1; done;
        mc mb --ignore-existing local/git-cdc-test

  forgejo:
    image: codeberg.org/forgejo/forgejo@sha256:c040958a31ef83643cc2f615150eda5992fb682d06084dc99b2211c9d357fc7e
    environment:
      FORGEJO__database__DB_TYPE: sqlite3
      FORGEJO__security__INSTALL_LOCK: "true"
      FORGEJO__server__ROOT_URL: http://127.0.0.1:53000/
      FORGEJO__service__DISABLE_REGISTRATION: "true"
    ports:
      - "127.0.0.1:53000:3000"
    tmpfs:
      - /var/lib/gitea:uid=1000,gid=1000
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/healthz"]
      interval: 2s
      timeout: 2s
      retries: 30
