services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: git_cdc
      POSTGRES_USER: git_cdc
      POSTGRES_PASSWORD: git_cdc
    ports:
      - "127.0.0.1:55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U git_cdc -d git_cdc"]
      interval: 2s
      timeout: 2s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: git_cdc
      MINIO_ROOT_PASSWORD: git_cdc_secret
    ports:
      - "127.0.0.1:59000:9000"
      - "127.0.0.1:59001:9001"
    tmpfs:
      - /data

  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      - minio
    entrypoint: /bin/sh
    command:
      - -c
      - >-
        until mc alias set local http://minio:9000 git_cdc git_cdc_secret; do sleep 1; done;
        mc mb --ignore-existing local/git-cdc-test
