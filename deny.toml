[graph]
all-features = true

[advisories]
version = 2
unmaintained = "workspace"
# sqlx 0.8 records this through its disabled MySQL driver. Git-CDC enables
# PostgreSQL only, and `cargo tree -i rsa --target all` has no path.
ignore = ["RUSTSEC-2023-0071"]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
