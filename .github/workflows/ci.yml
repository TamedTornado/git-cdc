name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  msrv:
    name: Rust 1.85 minimum version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets --locked

  native:
    name: Native (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.97.1
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Verify native tools
        run: |
          git --version
          git lfs version
      - name: Build all binaries
        run: cargo build --workspace --all-targets --locked
      - name: Cross-platform contracts
        run: cargo test --locked -p git-cdc-core -p git-cdc-protocol -p git-cdc-storage -p git-cdc

  integration:
    name: PostgreSQL, MinIO, and HTTP integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.97.1
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Run beta acceptance suite
        run: bash tests/acceptance.sh

  supply-chain:
    name: Supply chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.97.1
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit
      # sqlx records its disabled MySQL driver's unpatched rsa dependency in
      # Cargo.lock; `cargo tree -i rsa --target all` proves it is not compiled.
      - run: cargo audit --ignore RUSTSEC-2023-0071
      - run: cargo deny check
