name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  msrv:
    name: Rust 1.85 minimum version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets --locked

  native:
    name: Native (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86-64
            os: ubuntu-latest
          - name: Linux ARM64
            os: ubuntu-24.04-arm
          - name: macOS Intel
            os: macos-15-intel
          - name: macOS Apple Silicon
            os: macos-14
          - name: Windows x86-64
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.97.1
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Verify native tools
        run: |
          git --version
          git lfs version
      - name: Build all binaries
        run: cargo build --workspace --all-targets --locked
      - name: Cross-platform contracts
        run: cargo test --locked -p git-lfs-delta-core -p git-lfs-delta-protocol -p git-lfs-delta-storage -p git-lfs-delta

  release-dry-run:
    name: Release dry run (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c
        with:
          toolchain: 1.97.1
          targets: ${{ matrix.target }}
      - name: Install musl linker
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install --yes musl-tools
      - name: Build and exercise release package
        shell: bash
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: |
          cargo release-check v0.1.0-beta.2
          cargo build --release --locked -p git-lfs-delta --bin git-lfs-delta --target "${{ matrix.target }}"
          scripts/package-client.sh "${{ matrix.target }}" v0.1.0-beta.2 release
          tests/client_installer.sh release "${{ matrix.target }}"

  integration:
    name: PostgreSQL, MinIO, and HTTP integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.97.1
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Run the same quality gate used locally
        run: cargo ci
      - name: Run beta acceptance suite
        run: cargo acceptance

  supply-chain:
    name: Supply chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.97.1
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-audit
      # sqlx records its disabled MySQL driver's unpatched rsa dependency in
      # Cargo.lock; `cargo tree -i rsa --target all` proves it is not compiled.
      - run: cargo audit --ignore RUSTSEC-2023-0071
      - run: cargo deny check
